android.useAndroidX=true
android.nonTransitiveRClass=true
org.gradle.jvmargs=-Xmx2048m
org.gradle.java.home=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home

# Branch-tracked version. Update this when checking out a new
# dev-vX.Y.Z branch — every module reads it via the build-versioning
# helper and emits versionName="<glassholeVersion>" with versionCode
# = its own auto-incremented build counter (build_counter.txt per
# module, bumped on every successful APK package).
glassholeVersion=1.0.1
